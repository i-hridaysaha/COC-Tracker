name: Track village

# Runs itself. You do nothing after setup.
on:
  schedule:
    # Every day at 06:00 UTC. Change the time if you like.
    # Format is: minute hour day month weekday
    - cron: "0 6 * * *"
  # Also lets you trigger a run by hand from the Actions tab, handy for the
  # very first test.
  workflow_dispatch:
  # Edited village.json straight on github.com (e.g. from a phone or iPad)?
  # This rebuilds the dashboard within a minute instead of waiting for the
  # next scheduled run. Safe from looping: this workflow's own commits never
  # touch village.json, only the files it generates.
  push:
    branches: [master]
    paths:
      - "data/accounts/**/village.json"

# The job needs permission to commit the new snapshot back into the repo.
permissions:
  contents: write

# If a run is somehow still going when the next fires, don't stack them.
concurrency:
  group: track-village
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and analyse village
        env:
          COC_EMAIL: ${{ secrets.COC_EMAIL }}
          COC_PASSWORD: ${{ secrets.COC_PASSWORD }}
          COC_PLAYER_TAGS: ${{ secrets.COC_PLAYER_TAGS }}
          COC_PLAYER_TAG: ${{ secrets.COC_PLAYER_TAG }}
        run: python track.py

      - name: Copy dashboard as the GitHub Pages entry point
        run: cp dashboard.html index.html

      - name: Commit today's snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ dashboard.html index.html
          if git diff --staged --quiet; then
            echo "No change today, nothing to commit."
          else
            git commit -m "Village snapshot $(date -u +%Y-%m-%d)"
            git push
          fi
